<section *ngIf="!auth.isLoggedIn()" class="w-full my-0 py-0 overflow-hidden">
  <div class="registration-banner w-full py-12 md:py-16 lg:py-20 px-6 md:px-12 lg:px-20 relative overflow-hidden shadow-2xl flex flex-col lg:flex-row gap-12 items-center justify-between">
    
    <!-- Elementos decorativos de fondo limpios sin degradado verde -->
    <div class="absolute -top-40 -left-40 w-[500px] h-[500px] bg-white/5 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- Contenido Izquierdo (Texto & CTAs) -->
    <div class="flex-1 space-y-7 relative z-10 text-center lg:text-left max-w-3xl">
      <!-- Tag Badge -->
      <div class="inline-flex items-center gap-2.5 px-5 py-2 bg-white/10 border border-white/20 rounded-full backdrop-blur-md shadow-lg">
        <span class="w-2.5 h-2.5 rounded-full bg-white animate-pulse"></span>
        <span class="text-xs md:text-sm font-black uppercase tracking-widest text-white">🏷️ Ofertas & Beneficios VIP</span>
      </div>

      <!-- Título Principal con resalte verde de marca -->
      <h2 class="text-3xl sm:text-5xl lg:text-6xl font-black text-white leading-[1.1] tracking-tight">
        ¡Crea tu cuenta y obtén <br class="hidden sm:inline">
        <span class="text-[#B1D616]">DESCUENTOS EXCLUSIVOS</span> <br class="hidden sm:inline">
        en toda la tienda!
      </h2>

      <!-- Viñetas de Beneficios -->
      <div class="flex flex-wrap items-center justify-center lg:justify-start gap-4 pt-1">
        <div class="flex items-center gap-2.5 text-xs md:text-sm font-bold text-white bg-white/10 border border-white/15 px-4 py-2.5 rounded-2xl backdrop-blur-md shadow-sm">
          <span class="text-base">🎁</span>
          <span>Descuentos de Bienvenida</span>
        </div>
        <div class="flex items-center gap-2.5 text-xs md:text-sm font-bold text-white bg-white/10 border border-white/15 px-4 py-2.5 rounded-2xl backdrop-blur-md shadow-sm">
          <span class="text-base">🤖</span>
          <span>Asistente IA 24/7</span>
        </div>
        <div class="flex items-center gap-2.5 text-xs md:text-sm font-bold text-white bg-white/10 border border-white/15 px-4 py-2.5 rounded-2xl backdrop-blur-md shadow-sm">
          <span class="text-base">✨</span>
          <span>Diseños a Medida</span>
        </div>
      </div>

      <!-- Botones de Acción -->
      <div class="pt-4 flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-4">
        <a [routerLink]="['/login']" [queryParams]="{ mode: 'registro' }" class="btn-register-main">
          <span>Crear Cuenta Gratis</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
        </a>
        <a [routerLink]="['/login']" [queryParams]="{ mode: 'login' }" class="btn-login-secondary">
          <span>Iniciar Sesión</span>
        </a>
      </div>
    </div>

    <!-- Contenido Derecho (Imagen Banner Perro Súper Ancha) -->
    <div class="w-full lg:w-[660px] xl:w-[760px] 2xl:w-[840px] flex-shrink-0 relative z-10">
      <div class="banner-img-card">
        <img src="assets/images/bannerperro.png" alt="Mundo Canino Camascotas" class="banner-hero-img">
        <div class="img-badge-overlay">
          <span class="badge-dot"></span>
          <span>Mobiliario Pet Premium</span>
        </div>
      </div>
    </div>

  </div>
</section>
