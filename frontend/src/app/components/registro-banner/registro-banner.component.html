<section *ngIf="!auth.isLoggedIn()" class="px-4 md:px-8 max-w-7xl mx-auto my-8">
  <div class="registration-banner bg-gradient-to-r from-[#006E88] to-[#009DBA] rounded-3xl p-8 md:p-12 relative overflow-hidden shadow-xl flex flex-col md:flex-row gap-8 items-center justify-between">
    
    <!-- Decorative background elements -->
    <div class="absolute -top-24 -left-24 w-60 h-60 bg-white/5 rounded-full blur-2xl"></div>
    <div class="absolute -bottom-24 -right-24 w-72 h-72 bg-[#B1D616]/10 rounded-full blur-3xl"></div>

    <!-- Left Content -->
    <div class="flex-1 space-y-4 relative z-10 text-center md:text-left">
      <span class="inline-block px-3 py-1 bg-[#B1D616]/20 text-[#B1D616] text-xs font-bold uppercase tracking-wider rounded-full border border-[#B1D616]/30">
        Beneficios Exclusivos
      </span>
      <h2 class="text-3xl md:text-4xl font-extrabold text-white leading-tight">
        ¿Aún no tienes una cuenta?
      </h2>
      <p class="text-white/80 text-base md:text-lg max-w-2xl leading-relaxed">
        Regístrate gratis para realizar el seguimiento en tiempo real del descanso y los productos de tu mascota, guardar tus configuraciones personalizadas y chatear con nuestro Asistente AI.
      </p>
    </div>

    <!-- Right Call to Action -->
    <div class="w-full md:w-auto flex flex-col sm:flex-row items-center gap-4 relative z-10">
      <a [routerLink]="['/login']" [queryParams]="{ mode: 'registro' }" class="w-full sm:w-auto text-center px-8 py-4 bg-[#B1D616] hover:bg-[#9cbd12] text-slate-900 font-bold rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-0.5 whitespace-nowrap">
        Crear Cuenta Gratis
      </a>
      <a [routerLink]="['/login']" [queryParams]="{ mode: 'login' }" class="w-full sm:w-auto text-center px-6 py-4 bg-white/10 hover:bg-white/20 text-white font-semibold rounded-2xl border border-white/20 transition-all duration-300 whitespace-nowrap">
        Iniciar Sesión
      </a>
    </div>

  </div>
</section>
