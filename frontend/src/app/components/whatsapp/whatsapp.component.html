<div class="fixed bottom-6 right-6 z-[100]">
    <!-- Assistant Widget -->
    <div *ngIf="isChatOpen" class="absolute -bottom-4 lg:-bottom-5 right-0 lg:right-[-10px] animate-fade-in z-[110]">
        <app-asistente [isFloating]="true" (close)="closeChat()"></app-asistente>
    </div>

    <!-- Toggle Group (Button + Menu) -->
    <div class="group relative">
    <div class="absolute bottom-full right-0 mb-6 bg-white/90 backdrop-blur-md border border-gray-100 rounded-2xl shadow-2xl p-4 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 transform translate-y-4 group-hover:translate-y-0 w-52 text-sm">
        <h4 class="font-bold text-steel-blue mb-3 px-2">Contacto</h4>
        
        <div class="space-y-2">
            <!-- Bot -->
            <button (click)="toggleChat()" class="w-full flex items-center space-x-3 px-3 py-2 hover:bg-neutral-light rounded-xl transition-colors duration-200 text-gray-700">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-steel-blue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
                <span class="font-medium">Asistente Virtual</span>
            </button>

            <!-- WhatsApp -->
            <a href="https://api.whatsapp.com/send?phone=573207793380" target="_blank" class="w-full flex items-center space-x-3 px-3 py-2 hover:bg-green-50 rounded-xl transition-colors duration-200 text-gray-700 hover:text-green-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-500" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.417-.003 6.557-5.338 11.892-11.893 11.892-1.997-.001-3.951-.5-5.688-1.448l-6.305 1.652zm6.599-3.835c1.402.831 2.946 1.275 4.542 1.276 5.003 0 9.07-4.065 9.073-9.07.001-2.427-.942-4.709-2.656-6.424-1.713-1.715-3.993-2.659-6.42-2.66-5.004 0-9.073 4.068-9.076 9.073-.001 1.543.402 3.051 1.168 4.383l-1.004 3.666 3.753-.984zm11.238-5.31c-.301-.151-1.782-.879-2.058-.979s-.477-.151-.677.151-.778.98-.954 1.181-.351.226-.651.076c-.3-.15-1.267-.467-2.414-1.49-.893-.795-1.495-1.777-1.671-2.078s-.019-.463.132-.613c.135-.134.301-.351.451-.527.15-.176.201-.301.301-.502s.05-.376-.025-.527c-.075-.151-.677-1.632-.927-2.235-.243-.587-.49-.508-.677-.517-.175-.008-.376-.01-.577-.01s-.527.075-.802.376c-.276.301-1.053 1.029-1.053 2.51s1.079 2.912 1.229 3.113c.151.201 2.122 3.24 5.141 4.542.718.31 1.279.495 1.716.633.721.23 1.377.198 1.896.121.579-.085 1.737-.71 1.983-1.396.246-.686.246-1.275.171-1.397s-.271-.201-.572-.352z"/>
                </svg>
                <span class="font-medium">WhatsApp</span>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/camascotas/" target="_blank" class="w-full flex items-center space-x-3 px-3 py-2 hover:bg-pink-50 rounded-xl transition-colors duration-200 text-gray-700 hover:text-pink-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-pink-500" fill="currentColor" viewBox="0 0 24 24">
                   <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                </svg>
                <span class="font-medium">Instagram</span>
            </a>

            <!-- Teléfono -->
            <a href="tel:+573207793380" class="w-full flex items-center space-x-3 px-3 py-2 hover:bg-blue-50 rounded-xl transition-colors duration-200 text-gray-700 hover:text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
                <span class="font-medium">Teléfono</span>
            </a>
        </div>
    </div>
    
    <!-- Image Button -->
    <div class="w-40 h-40 bg-white rounded-full shadow-[0_25px_50px_rgba(0,0,0,0.25)] flex items-center justify-center transform hover:scale-105 active:scale-95 transition-all duration-300 cursor-pointer overflow-hidden border-4 border-white">
        <img src="assets/images/asistente.png" alt="Husky Asistente" class="w-full h-full object-cover">
    </div>
</div>
