<div class="fixed bottom-8 right-8 z-[100]">
    <!-- Chat Window -->
    <div *ngIf="isChatOpen" class="absolute bottom-[130px] right-0 w-[90vw] max-w-[360px] bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col border border-gray-100 transition-all duration-300 transform origin-bottom-right animate-fade-in z-50">
        <!-- Header: Rediseñado sin brillo blanco -->
        <div class="bg-gradient-to-br from-steel-blue to-[#3b5f70] p-5 text-white flex justify-between items-center shadow-lg relative overflow-hidden">
            <div class="flex items-center space-x-4 relative z-10">
                <div class="w-11 h-11 bg-white p-0.5 rounded-full shadow-inner ring-2 ring-white/20">
                    <div class="w-full h-full rounded-full overflow-hidden">
                        <img src="assets/images/social.png" alt="Elisa Avatar" class="w-full h-full object-cover scale-110">
                    </div>
                </div>
                <div class="flex flex-col">
                    <h3 class="font-bold text-[16px] tracking-tight leading-tight">Elisa - Asistente</h3>
                    <div class="flex items-center gap-1.5 mt-1">
                        <span class="relative flex h-2 w-2">
                           <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                           <span class="relative inline-flex rounded-full h-2 w-2 bg-green-400"></span>
                        </span>
                        <span class="text-[10px] text-blue-50/80 font-semibold uppercase tracking-wider">En línea</span>
                    </div>
                </div>
            </div>
            <button (click)="closeChat()" class="text-white/70 hover:text-white transition-all p-2 hover:bg-white/10 rounded-full group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform group-hover:rotate-90 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Chat Messages -->
        <div #chatScroll class="h-[380px] overflow-y-auto p-5 bg-[#f8fafc] space-y-5 scroll-smooth">
            <div *ngFor="let msg of chatHistory" class="flex flex-col max-w-[88%] animate-fade-in"
                [ngClass]="msg.isBot ? 'items-start mr-auto' : 'items-end ml-auto'">
                <div class="p-3.5 rounded-2xl shadow-sm text-[14px] leading-relaxed relative"
                    [ngClass]="msg.isBot ? 'bg-white text-gray-700 border border-gray-100 rounded-tl-sm' : 'bg-steel-blue text-white rounded-tr-sm'">
                    {{ msg.text }}
                </div>
                <span class="text-[10px] text-gray-400 mt-1 px-1" [ngClass]="msg.isBot ? 'text-left' : 'text-right'">{{ msg.isBot ? 'Asistente' : 'Tú' }}</span>
            </div>
            
            <!-- Loading Indicator -->
            <div *ngIf="isLoading" class="flex items-start mr-auto animate-fade-in">
                <div class="bg-white border border-gray-100 p-4 py-5 rounded-2xl rounded-tl-sm shadow-sm flex space-x-2 w-16 justify-center">
                    <div class="w-1.5 h-1.5 bg-steel-blue/40 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
                    <div class="w-1.5 h-1.5 bg-steel-blue/60 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                    <div class="w-1.5 h-1.5 bg-steel-blue rounded-full animate-bounce" style="animation-delay: 300ms"></div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-3 bg-white border-t border-gray-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.02)]">
            <form (ngSubmit)="sendMessage()" class="flex space-x-2 items-center">
                <input type="text" [(ngModel)]="userMessage" name="message" placeholder="Pregúntame algo..."
                    class="flex-1 border border-gray-200 rounded-full px-5 py-3.5 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-steel-blue/20 focus:border-steel-blue transition-all bg-gray-50/50 text-[14px]"
                    [disabled]="isLoading" autocomplete="off">
                <button type="submit" [disabled]="!userMessage.trim() || isLoading"
                    class="bg-steel-blue text-white w-12 h-12 flex items-center justify-center rounded-full hover:bg-blue-600 hover:shadow-lg hover:shadow-steel-blue/30 disabled:opacity-50 disabled:hover:shadow-none transition-all duration-300 shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Toggle Group (Button + Menu) -->
    <div class="group relative">
    <div class="absolute bottom-full right-0 mb-4 bg-white/90 backdrop-blur-md border border-gray-100 rounded-2xl shadow-2xl p-4 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 transform translate-y-4 group-hover:translate-y-0 w-48 text-sm">
        <h4 class="font-bold text-steel-blue mb-3 px-2">Contacto</h4>
        
        <div class="space-y-2">
            <!-- Bot -->
            <button (click)="toggleChat()" class="w-full flex items-center space-x-3 px-3 py-2 hover:bg-neutral-light rounded-xl transition-colors duration-200 text-gray-700">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-steel-blue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
                <span class="font-medium">Asistente Virtual</span>
            </button>

            <!-- WhatsApp -->
            <a href="https://api.whatsapp.com/send?phone=573207793380" target="_blank" class="w-full flex items-center space-x-3 px-3 py-2 hover:bg-green-50 rounded-xl transition-colors duration-200 text-gray-700 hover:text-green-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-500" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.417-.003 6.557-5.338 11.892-11.893 11.892-1.997-.001-3.951-.5-5.688-1.448l-6.305 1.652zm6.599-3.835c1.402.831 2.946 1.275 4.542 1.276 5.003 0 9.07-4.065 9.073-9.07.001-2.427-.942-4.709-2.656-6.424-1.713-1.715-3.993-2.659-6.42-2.66-5.004 0-9.073 4.068-9.076 9.073-.001 1.543.402 3.051 1.168 4.383l-1.004 3.666 3.753-.984zm11.238-5.31c-.301-.151-1.782-.879-2.058-.979s-.477-.151-.677.151-.778.98-.954 1.181-.351.226-.651.076c-.3-.15-1.267-.467-2.414-1.49-.893-.795-1.495-1.777-1.671-2.078s-.019-.463.132-.613c.135-.134.301-.351.451-.527.15-.176.201-.301.301-.502s.05-.376-.025-.527c-.075-.151-.677-1.632-.927-2.235-.243-.587-.49-.508-.677-.517-.175-.008-.376-.01-.577-.01s-.527.075-.802.376c-.276.301-1.053 1.029-1.053 2.51s1.079 2.912 1.229 3.113c.151.201 2.122 3.24 5.141 4.542.718.31 1.279.495 1.716.633.721.23 1.377.198 1.896.121.579-.085 1.737-.71 1.983-1.396.246-.686.246-1.275.171-1.397s-.271-.201-.572-.352z"/>
                </svg>
                <span class="font-medium">WhatsApp</span>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/camascotas/" target="_blank" class="w-full flex items-center space-x-3 px-3 py-2 hover:bg-pink-50 rounded-xl transition-colors duration-200 text-gray-700 hover:text-pink-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-pink-500" fill="currentColor" viewBox="0 0 24 24">
                   <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                </svg>
                <span class="font-medium">Instagram</span>
            </a>

            <!-- Teléfono -->
            <a href="tel:+573207793380" class="w-full flex items-center space-x-3 px-3 py-2 hover:bg-blue-50 rounded-xl transition-colors duration-200 text-gray-700 hover:text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
                <span class="font-medium">Teléfono</span>
            </a>
        </div>
    </div>
    
    <!-- Image Button -->
    <div class="w-28 h-28 bg-white rounded-full shadow-[0_15px_30px_rgba(0,0,0,0.15)] flex items-center justify-center transform hover:scale-105 active:scale-95 transition-all duration-300 cursor-pointer overflow-hidden border-4 border-white">
        <img src="assets/images/social.png" alt="Contacto Camascotas" class="w-full h-full object-cover">
    </div>
</div>
