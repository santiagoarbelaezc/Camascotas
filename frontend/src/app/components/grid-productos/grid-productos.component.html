<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12">
    @for (producto of productos; track producto.id) {
        <div class="group bg-white rounded-[40px] overflow-hidden shadow-2xl shadow-brand-petrol/5 hover:shadow-brand-petrol/20 transition-all duration-700 border border-brand-petrol/5 flex flex-col transform hover:-translate-y-4">
            <!-- Image Container -->
            <div class="relative aspect-[4/5] overflow-hidden bg-gray-50/50">
                <img [src]="producto.imagen" [alt]="producto.nombre" 
                     class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-[1.5s] ease-out">
                
                <!-- Badge -->
                <div class="absolute top-6 left-6">
                    <span class="bg-brand-turquesa text-white px-4 py-2 rounded-pill text-[9px] uppercase tracking-[0.3em] font-black border border-white/20 backdrop-blur-md shadow-lg shadow-brand-turquesa/20">
                        {{ producto.tipo }}
                    </span>
                </div>

                <!-- Hover Overlay -->
                <div class="absolute inset-0 bg-brand-petrol/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center backdrop-blur-[2px]">
                    <button class="bg-white text-brand-petrol p-5 rounded-full shadow-2xl transform translate-y-8 group-hover:translate-y-0 transition-transform duration-500 hover:bg-brand-turquesa hover:text-white group/btn">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover/btn:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Content -->
            <div class="p-8 lg:p-10 flex-grow flex flex-col bg-white">
                <div class="mb-6 space-y-3">
                    <h3 class="text-xl lg:text-2xl text-brand-petrol font-bold tracking-tight group-hover:text-brand-turquesa transition-colors duration-300 line-clamp-2 min-h-[3.5rem] lg:min-h-[4rem]">
                        {{ producto.nombre }}
                    </h3>
                    <p class="text-gray-400 text-xs lg:text-sm italic font-light line-clamp-2 min-h-[2.5rem] lg:min-h-[3rem]">
                        "{{ producto.descripcion }}"
                    </p>
                </div>
                
                <div class="mt-auto flex items-center justify-between border-t border-gray-50 pt-8">
                    <span class="text-3xl font-extralight text-brand-turquesa">
                        {{ producto.precio | currency:'USD':'symbol':'1.0-0' }}
                    </span>
                    <button class="text-brand-petrol font-black text-[10px] uppercase tracking-[0.4em] hover:text-brand-turquesa transition-all flex items-center gap-3 group/add">
                        Ver Detalles
                        <div class="w-8 h-8 rounded-full bg-brand-lima/10 flex items-center justify-center group-hover/add:bg-brand-lima group-hover/add:text-brand-petrol transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                            </svg>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    }
</div>
