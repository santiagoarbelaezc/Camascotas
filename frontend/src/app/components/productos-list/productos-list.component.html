<div class="productos-list-container">
  <div *ngIf="cargando" class="loader-container">
    <div class="loader"></div>
    <p>Buscando lo mejor para tu mascota...</p>
  </div>

  <div *ngIf="!cargando && productos.length > 0" class="productos-grid">
    <div *ngFor="let prod of productos" class="producto-card">
      <div class="image-wrapper">
        <img [src]="prod.imagen" [alt]="prod.nombre" loading="lazy">
        <div class="badge" *ngIf="prod.id % 3 === 0">Nuevo</div>
      </div>
      <div class="card-body">
        <h3 class="producto-nombre">{{ prod.nombre }}</h3>
        <p class="producto-desc">{{ prod.descripcion }}</p>
        <div class="card-footer">
          <span class="precio">{{ formatearPrecio(prod.precio) }}</span>
          <button class="add-btn" aria-label="Ver más">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!cargando && productos.length === 0" class="no-results">
    <div class="no-results-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg>
    </div>
    <h3>No encontramos productos</h3>
    <p>Intenta con otra categoría o limpia los filtros.</p>
  </div>
</div>
