<div class="menu-categorias-wrapper">
  <div class="menu-content">
    <div class="menu-header">
      <h3>Colecciones</h3>
      <button class="clear-btn" (click)="limpiarFiltros()" *ngIf="categoriaSeleccionadaId || subcategoriaSeleccionadaId">
        Limpiar Filtros
      </button>
    </div>

    <div class="categorias-list">
      <div *ngFor="let cat of categorias" class="categoria-item">
        <button 
          class="categoria-btn" 
          [class.active]="categoriaSeleccionadaId === cat.id"
          (click)="seleccionarCategoria(cat.id)">
          {{ cat.nombre }}
          <span class="indicator" *ngIf="categoriaSeleccionadaId === cat.id"></span>
        </button>

        <div class="subcategorias-list" *ngIf="categoriaSeleccionadaId === cat.id">
          <button 
            *ngFor="let sub of cat.subcategorias" 
            class="subcategoria-btn"
            [class.active]="subcategoriaSeleccionadaId === sub.id"
            (click)="seleccionarSubcategoria(cat.id, sub.id)">
            {{ sub.nombre }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
