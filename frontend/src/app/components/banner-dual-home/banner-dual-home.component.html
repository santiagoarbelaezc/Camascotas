<section class="banner-dual-section">
  <div class="banner-container">
    
    <!-- Banner Perros -->
    <div class="banner-item perros-banner">
      <div class="banner-overlay"></div>
      <img src="assets/images/bannerperro.png" alt="Mobiliario para Perros" class="banner-img">
      <div class="banner-content">
        <span class="banner-tag">Mundo Canino</span>
        <h2 class="banner-title">Confort para tu mejor amigo</h2>
        <a routerLink="/productos" [queryParams]="{categoria: 'Perros'}" class="banner-link">
          Explorar Perros
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 ml-2 inline">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
          </svg>
        </a>
      </div>
    </div>

    <!-- Banner Gatos -->
    <div class="banner-item gatos-banner">
      <div class="banner-overlay"></div>
      <img src="assets/images/bannergato.png" alt="Mobiliario para Gatos" class="banner-img">
      <div class="banner-content">
        <span class="banner-tag">Mundo Felino</span>
        <h2 class="banner-title">Diseño para el máximo relax</h2>
        <a routerLink="/productos" [queryParams]="{categoria: 'Gatos'}" class="banner-link">
          Explorar Gatos
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 ml-2 inline">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
          </svg>
        </a>
      </div>
    </div>

  </div>
</section>
