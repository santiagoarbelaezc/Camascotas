<div class="sticky-scroll-wrapper" #stickyWrapper>
  <section class="banner-container">
    
    <!-- Background Layers for Smooth Transitions -->
    <div class="background-layers">
      <div 
        *ngFor="let slide of slides; let i = index"
        class="bg-layer"
        [class.active]="activeIndex === i"
        [class.slide-0]="i === 0"
        [class.slide-1]="i === 1"
        [style.background-image]="'url(' + slide.image + ')'">
        <!-- Oscurecido suave de la imagen -->
        <div class="dark-overlay"></div>
      </div>
    </div>

    <!-- Center Content Overlay (Pinnable layout sin contenedor opaco) -->
    <div class="content-wrapper-pin">
      <div 
        *ngFor="let slide of slides; let i = index"
        class="slide-content-pin"
        [class.active]="activeIndex === i">
        
        <div class="text-content">
          <p class="subtitle">{{ slide.subtitle }}</p>
          <h2 class="title">{{ slide.title }}</h2>
          <p class="description">{{ slide.description }}</p>
          
          <div class="action-wrap" [class.show]="activeIndex === i">
            <a routerLink="/productos" [queryParams]="{categoria: slide.categoriaParam}" class="btn-outline">
              <span>{{ slide.btnText }}</span>
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Scroll Indicators / Navigation Dots -->
    <div class="scroll-dots">
      <span 
        *ngFor="let slide of slides; let i = index" 
        class="dot" 
        [class.active]="activeIndex === i"
        (click)="scrollToIndex(i)">
      </span>
    </div>

  </section>
</div>
