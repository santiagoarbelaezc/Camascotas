<section class="w-full my-0 py-0 overflow-hidden">
  <div class="contact-aviso-bar w-full py-6 md:py-8 px-6 md:px-12 flex flex-col lg:flex-row items-center justify-between gap-6 border-b border-white/10 shadow-lg">
    
    <!-- Contenido Izquierdo: Mensaje, Dirección & Punto de Fábrica -->
    <div class="flex-1 space-y-3.5 text-center lg:text-left max-w-4xl">
      <!-- Badges Superiores -->
      <div class="flex flex-wrap items-center justify-center lg:justify-start gap-3">
        <span class="inline-flex items-center gap-2 px-3.5 py-1 rounded-full bg-emerald-500/20 border border-emerald-500/30 text-emerald-300 text-xs font-bold whitespace-nowrap">
          <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
          </span>
          <span>Asesores en Línea</span>
        </span>
        
        <span class="inline-flex items-center gap-2 px-3.5 py-1 rounded-full bg-white/10 border border-white/20 text-[#B1D616] text-xs font-bold uppercase tracking-wider whitespace-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#B1D616] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <span>Punto de Fábrica Oficial</span>
        </span>
      </div>

      <!-- Título -->
      <h2 class="text-xl sm:text-2xl lg:text-3xl font-black text-white leading-tight tracking-tight">
        Visítanos en nuestro punto de fábrica o <span class="text-[#B1D616]">habla con nosotros en línea</span>
      </h2>

      <!-- Dirección Completa y Horario -->
      <div class="flex flex-wrap items-center justify-center lg:justify-start gap-5 text-xs md:text-sm text-white/90 font-medium">
        <div class="flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#B1D616] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <span class="whitespace-nowrap"><strong>Espumas y Plásticos SAS</strong> — Cra. 19 #19 - 27, Armenia, Quindío</span>
        </div>
        <div class="hidden sm:flex items-center gap-2 text-white/75">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#00B3BC] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span class="whitespace-nowrap">Lun - Sáb: 8:00 AM - 6:00 PM</span>
        </div>
      </div>
    </div>

    <!-- Contenido Derecho: Botones con Iconos Vectoriales Pulidos -->
    <div class="flex flex-wrap items-center justify-center gap-3.5 shrink-0">
      <!-- Botón ¿Cómo Llegar? (Toma Ubicación GPS) -->
      <button (click)="comoLlegar()"
        class="inline-flex items-center gap-2.5 px-5 py-3 bg-[#B1D616] hover:bg-[#c7ef1a] text-[#002835] font-extrabold text-xs uppercase tracking-wider rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5 whitespace-nowrap cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#002835] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
        </svg>
        <span>¿Cómo Llegar?</span>
      </button>

      <!-- Ver Ubicación en Google Maps -->
      <a href="https://www.google.com/maps/place/Espumas+y+Pl%C3%A1sticos+SAS/@4.5356269,-75.677381,17z" target="_blank"
        class="inline-flex items-center gap-2 px-4.5 py-3 bg-white/10 hover:bg-white/20 text-white font-bold text-xs uppercase tracking-wider rounded-xl border border-white/20 transition-all whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#00B3BC] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
        </svg>
        <span>Ver Mapa</span>
      </a>

      <!-- Hablar por WhatsApp -->
      <a [href]="generarEnlaceWhatsApp()" target="_blank"
        class="inline-flex items-center gap-2.5 px-5 py-3 bg-[#25D366] hover:bg-[#20bd5a] text-white font-bold text-xs uppercase tracking-wider rounded-xl shadow-md transition-all transform hover:-translate-y-0.5 whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 fill-current shrink-0" viewBox="0 0 24 24">
          <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.417-.003 6.557-5.338 11.892-11.893 11.892-1.997-.001-3.951-.5-5.688-1.448l-6.305 1.652zm6.599-3.835c1.402.831 2.946 1.275 4.542 1.276 5.003 0 9.07-4.065 9.073-9.07.001-2.427-.942-4.709-2.656-6.424-1.713-1.715-3.993-2.659-6.42-2.66-5.004 0-9.073 4.068-9.076 9.073-.001 1.543.402 3.051 1.168 4.383l-1.004 3.666 3.753-.984zm11.238-5.31c-.301-.151-1.782-.879-2.058-.979s-.477-.151-.677.151-.778.98-.954 1.181-.351.226-.651.076c-.3-.15-1.267-.467-2.414-1.49-.893-.795-1.495-1.777-1.671-2.078s-.019-.463.132-.613c.135-.134.301-.351.451-.527.15-.176.201-.301.301-.502s.05-.376-.025-.527c-.075-.151-.677-1.632-.927-2.235-.243-.587-.49-.508-.677-.517-.175-.008-.376-.01-.577-.01s-.527.075-.802.376c-.276.301-1.053 1.029-1.053 2.51s1.079 2.912 1.229 3.113c.151.201 2.122 3.24 5.141 4.542.718.31 1.279.495 1.716.633.721.23 1.377.198 1.896.121.579-.085 1.737-.71 1.983-1.396.246-.686.246-1.275.171-1.397s-.271-.201-.572-.352z"/>
        </svg>
        <span>WhatsApp</span>
      </a>
    </div>

  </div>
</section>
