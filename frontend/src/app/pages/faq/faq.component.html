<div class="bg-gray-50/50 py-20 px-6 min-h-screen">
  <div class="max-w-4xl mx-auto bg-white p-10 md:p-16 rounded-3xl shadow-sm border border-slate-100">
    <div class="mb-12 text-center">
      <h1 class="text-3xl md:text-4xl font-extrabold text-slate-800 mb-4 font-poppins">Preguntas Frecuentes</h1>
      <p class="text-slate-500 max-w-2xl mx-auto">Encuentra respuestas rápidas a las dudas más comunes de nuestra comunidad. Si no encuentras lo que buscas, contáctanos.</p>
    </div>

    <div class="space-y-4">
      <div *ngFor="let faq of faqs; let i = index" class="border border-slate-100 rounded-2xl overflow-hidden transition-all duration-300" [class.shadow-md]="activeIndex === i">
        <button 
          (click)="toggleFaq(i)" 
          class="w-full text-left p-6 flex justify-between items-center bg-white hover:bg-slate-50 transition-colors">
          <span class="font-semibold text-slate-800 text-lg pr-4 font-poppins">{{ faq.question }}</span>
          <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 transition-transform duration-300" 
               [class.bg-[#00B3BC]]="activeIndex === i"
               [class.text-white]="activeIndex === i"
               [class.bg-slate-100]="activeIndex !== i"
               [class.text-slate-500]="activeIndex !== i"
               [style.transform]="activeIndex === i ? 'rotate(180deg)' : 'rotate(0)'">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
          </div>
        </button>
        
        <div 
          class="overflow-hidden transition-all duration-300 ease-in-out"
          [style.maxHeight]="activeIndex === i ? '500px' : '0'">
          <div class="p-6 pt-0 text-slate-600 leading-relaxed border-t border-slate-50 mt-2">
            {{ faq.answer }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
