<section class="legal-page">

  <!-- Hero Header -->
  <div class="legal-hero">
    <div class="legal-hero-inner">
      <div class="legal-hero-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
        </svg>
      </div>
      <h1 class="legal-hero-title">Preguntas Frecuentes</h1>
      <p class="legal-hero-subtitle">Encuentra respuestas rápidas. Si no encuentras lo que buscas, <a routerLink="/contacto" class="legal-hero-link">escríbenos</a>.</p>
    </div>
  </div>

  <div class="faq-body">

    <!-- Category Tabs -->
    <div class="faq-tabs">
      <button
        *ngFor="let cat of categories"
        class="faq-tab"
        [class.active]="activeCategory === cat.id"
        (click)="setCategory(cat.id)">
        <span class="faq-tab-icon">
          <!-- SVG para Productos -->
          <svg *ngIf="cat.icon === 'productos'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 9h6m-6 4h6m-6 4h6" />
          </svg>
          <!-- SVG para Pedidos -->
          <svg *ngIf="cat.icon === 'pedidos'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 7.5l-9-5.25L3 7.5m18 0l-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9" />
          </svg>
          <!-- SVG para Envíos -->
          <svg *ngIf="cat.icon === 'envios'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
          </svg>
          <!-- SVG para Cuenta -->
          <svg *ngIf="cat.icon === 'cuenta'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
        </span>
        {{ cat.label }}
      </button>
    </div>

    <!-- Questions Accordion -->
    <div class="faq-accordion">
      <div
        *ngFor="let faq of activeFaqs; let i = index"
        class="faq-item"
        [class.open]="activeIndex === i">
        <button class="faq-question" (click)="toggleFaq(i)">
          <span>{{ faq.question }}</span>
          <div class="faq-chevron">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
            </svg>
          </div>
        </button>
        <div class="faq-answer" [style.maxHeight]="activeIndex === i ? '400px' : '0'">
          <div class="faq-answer-inner">{{ faq.answer }}</div>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div class="legal-cta">
      <p>¿No encontraste tu respuesta?</p>
      <a routerLink="/contacto" class="legal-cta-btn">Contáctanos directamente</a>
    </div>

  </div>
</section>
