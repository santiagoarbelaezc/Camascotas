<div class="productos-page">
  <!-- Botón flotante para móvil -->
  <button class="menu-toggle-categorias" (click)="toggleMenu()" [class.hidden]="menuVisible">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" />
    </svg>
    Categorías
  </button>

  <div class="productos-layout">
    <!-- Sidebar / Drawer -->
    <aside class="sidebar-container" [class.menu-visible]="menuVisible">
      <div class="sidebar-header mobile-only">
        <h3>Filtrar por</h3>
        <button (click)="cerrarMenu()" class="close-drawer">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
        </button>
      </div>
      <app-menu-categorias (click)="$event.stopPropagation()"></app-menu-categorias>
    </aside>

    <!-- Overlay para móvil -->
    <div class="menu-overlay" *ngIf="menuVisible" (click)="cerrarMenu()"></div>

    <!-- Contenido Principal -->
    <main class="main-content">
      <div class="hero-productos">
        <h1>Nuestras Colecciones</h1>
        <p>Diseños pensados para la felicidad y comodidad de tu mascota.</p>
      </div>
      
      <app-productos-list></app-productos-list>
    </main>
  </div>

  <!-- Sección de Cierre -->
  <app-por-que-elegirnos></app-por-que-elegirnos>
</div>
