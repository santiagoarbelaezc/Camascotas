<div class="productos-page relative overflow-hidden bg-cream min-h-screen">
  <!-- Brand Aesthetics Decorations -->
  <div class="absolute top-0 right-0 -translate-y-1/2 translate-x-1/4 w-96 h-96 bg-brand-turquesa/5 rounded-full blur-3xl"></div>
  <div class="absolute bottom-1/2 left-0 -translate-x-1/2 w-72 h-72 bg-brand-lima/5 rounded-full blur-3xl"></div>

  <!-- Botón flotante para móvil (Solo visible en pantallas pequeñas) -->
  <button class="menu-toggle-categorias btn-secondary fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] lg:hidden flex items-center gap-3 shadow-[0_10px_30px_rgba(0,179,188,0.3)] transition-all duration-300 active:scale-95" 
          (click)="toggleMenu()" 
          *ngIf="!menuVisible">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" />
    </svg>
    <span class="uppercase tracking-[0.2em] text-[11px] font-black">Filtrar Colecciones</span>
  </button>

  <div class="productos-layout max-w-[1800px] mx-auto px-4 lg:px-12 py-32 relative z-10 grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-16">
    <!-- Sidebar / Drawer -->
    <aside class="sidebar-container lg:col-span-3 xl:col-span-2" [class.menu-visible]="menuVisible">
      <div class="sidebar-header mobile-only flex justify-between items-center mb-10 pb-6 border-b border-gray-100">
        <h3 class="text-brand-petrol font-bold uppercase tracking-widest text-sm">Filtrar por</h3>
        <button (click)="cerrarMenu()" class="close-drawer text-gray-300 hover:text-brand-turquesa transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
        </button>
      </div>
      <app-menu-categorias (click)="cerrarMenuSiEsMovil()"></app-menu-categorias>
    </aside>

    <!-- Overlay para móvil -->
    <div class="menu-overlay fixed inset-0 bg-brand-petrol/20 backdrop-blur-sm z-[90]" *ngIf="menuVisible" (click)="cerrarMenu()"></div>

    <!-- Contenido Principal -->
    <main class="main-content lg:col-span-9 xl:col-span-10">
      <div class="hero-productos mb-16 space-y-4">
        <span class="text-brand-turquesa font-black tracking-[0.4em] uppercase text-[10px] bg-brand-turquesa/5 px-4 py-2 rounded-pill inline-block">Mobiliario Pet Premium</span>
        <h1 class="text-brand-petrol text-4xl md:text-6xl font-bold tracking-tight normal-case">
          Nuestras <span class="text-brand-turquesa">Colecciones</span>
        </h1>
        <div class="w-12 h-1 bg-brand-lima rounded-full mb-8"></div>
        <p class="text-xl text-gray-400 font-light max-w-2xl leading-relaxed">
          Diseños pensados para la felicidad y comodidad de tu mascota, fabricados a mano con materiales premium.
        </p>
      </div>
      
      <app-productos-list></app-productos-list>
    </main>
  </div>

  <!-- Sección de Cierre -->
  <app-por-que-elegirnos></app-por-que-elegirnos>
</div>
