<div class="min-h-screen bg-brand-turquesa flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden font-poppins">
  <!-- Decorative Background Blobs -->
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-brand-lima/20 rounded-full blur-[120px]"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-brand-petrol/20 rounded-full blur-[120px]"></div>

  <!-- Back to Home Button -->
  <button (click)="backToHome()" class="absolute top-8 left-8 flex items-center gap-3 text-white/80 hover:text-white transition-all duration-300 group z-20">
    <div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center group-hover:bg-brand-lima group-hover:text-brand-petrol transform group-hover:-translate-x-1 transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </div>
    <span class="font-bold text-xs uppercase tracking-[0.2em]">Regresar</span>
  </button>

  <div class="max-w-md w-full bg-white rounded-[40px] shadow-2xl p-12 space-y-10 relative z-10 border border-white/20">
    <div class="text-center">
      <div class="inline-block p-4 bg-brand-turquesa/5 rounded-3xl mb-6">
        <img src="assets/icons/logo.png" alt="Camascotas" class="h-10 w-auto filter contrast-125">
      </div>
      <h1 class="text-3xl font-bold text-brand-petrol mb-2 tracking-tight">Acceso Staff</h1>
      <p class="text-sm text-gray-400 font-medium">Gestiona el mobiliario pet con amor</p>
    </div>
    
    <form class="space-y-6" (submit)="login(); $event.preventDefault()">
      <div class="space-y-5">
        <div>
          <label for="email-address" class="block text-[10px] font-black text-brand-petrol uppercase tracking-[0.2em] mb-2 px-1">Email Corporativo</label>
          <input id="email-address" name="correo" type="email" autocomplete="off" required
            [(ngModel)]="correo"
            class="appearance-none relative block w-full px-6 py-4 border border-gray-100 placeholder-gray-300 text-brand-petrol rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-turquesa/10 focus:border-brand-turquesa sm:text-sm transition-all bg-gray-50/50" placeholder="tu@correo.com">
        </div>
        <div>
          <label for="password" class="block text-[10px] font-black text-brand-petrol uppercase tracking-[0.2em] mb-2 px-1">Contraseña</label>
          <div class="relative">
            <input id="password" name="password" [type]="showPassword ? 'text' : 'password'" autocomplete="off" required
              [(ngModel)]="password"
              class="appearance-none relative block w-full px-6 py-4 border border-gray-100 placeholder-gray-300 text-brand-petrol rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-turquesa/10 focus:border-brand-turquesa sm:text-sm transition-all bg-gray-50/50 pr-14" placeholder="••••••••">
            
            <button type="button" (click)="showPassword = !showPassword" class="absolute right-4 top-1/2 -translate-y-1/2 p-2 text-gray-300 hover:text-brand-turquesa transition-colors">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 1.274-4.057 5.064-7 9.542-7 1.225 0 2.39.213 3.475.602m2.84 2.84A10.003 10.003 0 0121.542 12c-1.274 4.057-5.064 7-9.542 7-1.225 0-2.39-.213-3.475-.602m0 0L9 10.125m3.125 3.125l3.125 3.125" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="flex items-center justify-between px-1">
        <div class="flex items-center">
          <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-brand-turquesa focus:ring-brand-turquesa border-gray-200 rounded transition-all">
          <label for="remember-me" class="ml-2 block text-[11px] font-bold text-gray-400 uppercase tracking-wider">
            Recordar
          </label>
        </div>

        <div class="text-[11px]">
          <a href="#" class="font-bold text-brand-turquesa hover:text-brand-turquesa/80 transition-colors uppercase tracking-wider">
            ¿Olvido?
          </a>
        </div>
      </div>

      <!-- Error message -->
      <div *ngIf="error" class="bg-red-50 border border-red-200 rounded-2xl px-5 py-3 text-sm text-red-600 font-medium">{{ error }}</div>

      <div class="pt-4">
        <button type="submit" [disabled]="cargando" class="btn-primary w-full py-4 text-sm uppercase tracking-[0.2em] shadow-2xl shadow-brand-lima/30 active:scale-95 disabled:opacity-60">
          {{ cargando ? 'Verificando...' : 'Ingresar al Panel' }}
        </button>
      </div>
    </form>
  </div>
</div>
