<div class="min-h-[calc(100vh-100px)] bg-cream flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 space-y-8">
    <div class="text-center">
      <h2 class="text-3xl font-bold text-gray-900 mb-2">Bienvenido de nuevo</h2>
      <p class="text-sm text-gray-500">Ingresa tus credenciales para acceder</p>
      <div class="w-16 h-1 bg-steel-blue mx-auto mt-6"></div>
    </div>
    
    <form class="space-y-6" (submit)="login(); $event.preventDefault()">
      <div class="space-y-4">
        <div>
          <label for="email-address" class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
          <input id="email-address" name="email" type="email" autocomplete="email" required class="appearance-none relative block w-full px-4 py-3 border border-gray-200 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-steel-blue focus:border-steel-blue focus:z-10 sm:text-sm transition-all bg-neutral-50" placeholder="admin@camascotas.com">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none relative block w-full px-4 py-3 border border-gray-200 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-steel-blue focus:border-steel-blue focus:z-10 sm:text-sm transition-all bg-neutral-50" placeholder="••••••••">
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-steel-blue focus:ring-steel-blue border-gray-300 rounded">
          <label for="remember-me" class="ml-2 block text-sm text-gray-900">
            Recordarme
          </label>
        </div>

        <div class="text-sm">
          <a href="#" class="font-medium text-steel-blue hover:text-steel-blue/80 transition-colors">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
      </div>

      <div>
        <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-steel-blue hover:bg-steel-blue/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-steel-blue shadow-lg shadow-steel-blue/30 transform hover:-translate-y-1 transition-all duration-300">
          Ingresar
        </button>
      </div>
    </form>
  </div>
</div>
