<div class="min-h-screen bg-brand-turquesa flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden font-poppins">
  <!-- Decorative Background Blobs -->
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-brand-lima/20 rounded-full blur-[120px]"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-brand-petrol/20 rounded-full blur-[120px]"></div>

  <!-- Back to Home Button -->
  <button (click)="backToHome()" class="absolute top-8 left-8 flex items-center gap-3 text-white/80 hover:text-white transition-all duration-300 group z-20">
    <div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center group-hover:bg-brand-lima group-hover:text-brand-petrol transform group-hover:-translate-x-1 transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </div>
    <span class="font-bold text-xs uppercase tracking-[0.2em]">Regresar</span>
  </button>

  <div class="max-w-md w-full bg-white rounded-[40px] shadow-2xl p-8 md:p-12 space-y-8 relative z-10 border border-white/20">
    
    <!-- Header -->
    <div class="text-center">
      <div class="inline-block p-3 bg-brand-turquesa/5 rounded-2xl mb-4">
        <img src="assets/icons/logo.png" alt="Camascotas" class="h-8 w-auto filter contrast-125">
      </div>
      <h1 class="text-2xl font-black text-brand-petrol mb-1 tracking-tight">
        {{ modo === 'login' ? 'Bienvenido de vuelta' : 'Crea tu Cuenta' }}
      </h1>
      <p class="text-xs text-gray-400 font-medium">
        {{ modo === 'login' ? 'Ingresa para gestionar tu cuenta de Camascotas' : 'Regístrate para comprar y seguir a tu mascota' }}
      </p>
    </div>

    <!-- Tab Switcher -->
    <div class="flex bg-gray-50 p-1 rounded-2xl border border-gray-100">
      <button type="button" (click)="cambiarModo('login')" 
              class="flex-1 py-3 text-[10px] uppercase tracking-[0.15em] font-black rounded-xl transition-all" 
              [class.bg-white]="modo === 'login'" 
              [class.shadow-sm]="modo === 'login'" 
              [class.text-brand-petrol]="modo === 'login'" 
              [class.text-gray-400]="modo !== 'login'">
        Ingresar
      </button>
      <button type="button" (click)="cambiarModo('registro')" 
              class="flex-1 py-3 text-[10px] uppercase tracking-[0.15em] font-black rounded-xl transition-all" 
              [class.bg-white]="modo === 'registro'" 
              [class.shadow-sm]="modo === 'registro'" 
              [class.text-brand-petrol]="modo === 'registro'" 
              [class.text-gray-400]="modo !== 'registro'">
        Registrarse
      </button>
    </div>

    <!-- LOGIN FORM -->
    <form *ngIf="modo === 'login'" class="space-y-5" (submit)="login(); $event.preventDefault()">
      <div class="space-y-4">
        <div>
          <label for="email-address" class="block text-[9px] font-black text-brand-petrol uppercase tracking-[0.2em] mb-1.5 px-1">Correo Electrónico</label>
          <input id="email-address" name="correo" type="email" autocomplete="email" required
            [(ngModel)]="correo"
            class="appearance-none relative block w-full px-5 py-3.5 border border-gray-100 placeholder-gray-300 text-brand-petrol rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-turquesa/10 focus:border-brand-turquesa text-sm transition-all bg-gray-50/50" placeholder="tu@correo.com">
        </div>
        <div>
          <label for="password" class="block text-[9px] font-black text-brand-petrol uppercase tracking-[0.2em] mb-1.5 px-1">Contraseña</label>
          <div class="relative">
            <input id="password" name="password" [type]="showPassword ? 'text' : 'password'" autocomplete="current-password" required
              [(ngModel)]="password"
              class="appearance-none relative block w-full px-5 py-3.5 border border-gray-100 placeholder-gray-300 text-brand-petrol rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-turquesa/10 focus:border-brand-turquesa text-sm transition-all bg-gray-50/50 pr-12" placeholder="••••••••">
            
            <button type="button" (click)="showPassword = !showPassword" class="absolute right-4 top-1/2 -translate-y-1/2 p-2 text-gray-300 hover:text-brand-turquesa transition-colors">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 1.274-4.057 5.064-7 9.542-7 1.225 0 2.39.213 3.475.602m2.84 2.84A10.003 10.003 0 0121.542 12c-1.274 4.057-5.064 7-9.542 7-1.225 0-2.39-.213-3.475-.602m0 0L9 10.125m3.125 3.125l3.125 3.125" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="flex items-center justify-between px-1">
        <div class="flex items-center">
          <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-brand-turquesa focus:ring-brand-turquesa border-gray-200 rounded transition-all">
          <label for="remember-me" class="ml-2 block text-[10px] font-bold text-gray-400 uppercase tracking-wider">
            Recordar
          </label>
        </div>
        <div class="text-[10px]">
          <a href="#" class="font-bold text-brand-turquesa hover:text-brand-turquesa/80 transition-colors uppercase tracking-wider">
            ¿Olvido?
          </a>
        </div>
      </div>

      <!-- Error message -->
      <div *ngIf="error" class="bg-red-50 border border-red-200 rounded-2xl px-5 py-3 text-xs text-red-600 font-medium">{{ error }}</div>

      <div>
        <button type="submit" [disabled]="cargando" class="btn-primary w-full py-3.5 text-xs uppercase tracking-[0.2em] shadow-xl shadow-brand-lima/30 active:scale-95 disabled:opacity-60">
          {{ cargando ? 'Verificando...' : 'Iniciar Sesión' }}
        </button>
      </div>

      <!-- Google Sign In Button -->
      <div class="relative flex items-center justify-center my-4">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
        <span class="relative bg-white px-3 text-[9px] uppercase tracking-widest text-gray-400 font-bold">o continúa con</span>
      </div>

      <div class="flex justify-center w-full">
        <div id="googleBtn" class="w-full flex justify-center"></div>
      </div>
    </form>

    <!-- REGISTRATION FORM -->
    <form *ngIf="modo === 'registro'" class="space-y-4" (submit)="registrar(); $event.preventDefault()">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="reg-nombre" class="block text-[9px] font-black text-brand-petrol uppercase tracking-[0.2em] mb-1.5 px-1">Nombre</label>
          <input id="reg-nombre" name="nombre" type="text" required [(ngModel)]="nombre"
            class="appearance-none relative block w-full px-4 py-3 border border-gray-100 placeholder-gray-300 text-brand-petrol rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-turquesa/10 focus:border-brand-turquesa text-sm transition-all bg-gray-50/50" placeholder="Nombre">
        </div>
        <div>
          <label for="reg-apellidos" class="block text-[9px] font-black text-brand-petrol uppercase tracking-[0.2em] mb-1.5 px-1">Apellidos</label>
          <input id="reg-apellidos" name="apellidos" type="text" required [(ngModel)]="apellidos"
            class="appearance-none relative block w-full px-4 py-3 border border-gray-100 placeholder-gray-300 text-brand-petrol rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-turquesa/10 focus:border-brand-turquesa text-sm transition-all bg-gray-50/50" placeholder="Apellidos">
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4">
        <div class="col-span-1">
          <label for="reg-edad" class="block text-[9px] font-black text-brand-petrol uppercase tracking-[0.2em] mb-1.5 px-1">Edad</label>
          <input id="reg-edad" name="edad" type="number" required [(ngModel)]="edad" min="1" max="120"
            class="appearance-none relative block w-full px-4 py-3 border border-gray-100 placeholder-gray-300 text-brand-petrol rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-turquesa/10 focus:border-brand-turquesa text-sm transition-all bg-gray-50/50" placeholder="Ej: 25">
        </div>
        <div class="col-span-2">
          <label for="reg-ciudad" class="block text-[9px] font-black text-brand-petrol uppercase tracking-[0.2em] mb-1.5 px-1">Ciudad</label>
          <input id="reg-ciudad" name="ciudad" type="text" required [(ngModel)]="ciudad"
            class="appearance-none relative block w-full px-4 py-3 border border-gray-100 placeholder-gray-300 text-brand-petrol rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-turquesa/10 focus:border-brand-turquesa text-sm transition-all bg-gray-50/50" placeholder="Ciudad (ej: Armenia)">
        </div>
      </div>

      <div>
        <label for="reg-direccion" class="block text-[9px] font-black text-brand-petrol uppercase tracking-[0.2em] mb-1.5 px-1">Dirección de Envío</label>
        <input id="reg-direccion" name="direccion" type="text" required [(ngModel)]="direccion"
          class="appearance-none relative block w-full px-4 py-3 border border-gray-100 placeholder-gray-300 text-brand-petrol rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-turquesa/10 focus:border-brand-turquesa text-sm transition-all bg-gray-50/50" placeholder="Calle 10 # 15-20, Apto 101">
      </div>

      <div>
        <label for="reg-correo" class="block text-[9px] font-black text-brand-petrol uppercase tracking-[0.2em] mb-1.5 px-1">Correo Electrónico</label>
        <input id="reg-correo" name="correo" type="email" required [(ngModel)]="correo" autocomplete="email"
          class="appearance-none relative block w-full px-4 py-3 border border-gray-100 placeholder-gray-300 text-brand-petrol rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-turquesa/10 focus:border-brand-turquesa text-sm transition-all bg-gray-50/50" placeholder="cliente@correo.com">
      </div>

      <div>
        <label for="reg-password" class="block text-[9px] font-black text-brand-petrol uppercase tracking-[0.2em] mb-1.5 px-1">Crear Contraseña</label>
        <div class="relative">
          <input id="reg-password" name="password" [type]="showPassword ? 'text' : 'password'" required [(ngModel)]="password" autocomplete="new-password"
            class="appearance-none relative block w-full px-4 py-3 border border-gray-100 placeholder-gray-300 text-brand-petrol rounded-2xl focus:outline-none focus:ring-4 focus:ring-brand-turquesa/10 focus:border-brand-turquesa text-sm transition-all bg-gray-50/50 pr-12" placeholder="Contraseña">
          
          <button type="button" (click)="showPassword = !showPassword" class="absolute right-4 top-1/2 -translate-y-1/2 p-2 text-gray-300 hover:text-brand-turquesa transition-colors">
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 1.274-4.057 5.064-7 9.542-7 1.225 0 2.39.213 3.475.602m2.84 2.84A10.003 10.003 0 0121.542 12c-1.274 4.057-5.064 7-9.542 7-1.225 0-2.39-.213-3.475-.602m0 0L9 10.125m3.125 3.125l3.125 3.125" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Error message -->
      <div *ngIf="error" class="bg-red-50 border border-red-200 rounded-2xl px-5 py-3 text-xs text-red-600 font-medium">{{ error }}</div>

      <div class="pt-2">
        <button type="submit" [disabled]="cargando" class="btn-primary w-full py-3.5 text-xs uppercase tracking-[0.2em] shadow-xl shadow-brand-lima/30 active:scale-95 disabled:opacity-60">
          {{ cargando ? 'Registrando...' : 'Registrarse y Entrar' }}
        </button>
      </div>
    </form>

  </div>
</div>
