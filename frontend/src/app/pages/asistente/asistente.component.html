<div class="chat-shell font-poppins" [class.chat-shell-floating]="isFloating">

  <!-- ── HEADER ── -->
  <header class="chat-header">
    <div class="header-brand">
      <div class="avatar-ring">
        <img src="assets/videos/husky.png" alt="Husky" class="avatar-img">
        <span class="online-dot"></span>
      </div>
      <div>
        <p class="agent-name">Husky</p>
        <p class="agent-status">Agente Husky · Camascotas</p>
      </div>
    </div>
    <div class="header-actions">
      <button (click)="clearChat()" class="new-chat-btn" title="Nueva conversación">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      </button>

      <button *ngIf="isFloating" (click)="close.emit()" class="close-chat-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12" />
        </svg>
      </button>
    </div>
  </header>

  <!-- ── CHAT BODY ── -->
  <div class="chat-body" [class.chat-active]="messages.length > 0" (scroll)="onScroll()" #chatContainer>

    <!-- Mascot Display (Dynamic) -->
    <div class="mascot-container" [class.mini-mode]="isMini">
      <div class="mascot-wrap" (click)="toggleMascot()">
        <!-- Imagen base (siempre presente como fallback o fondo) -->
        <img [src]="idleImage" alt="Husky" class="mascot-img base-img" 
             [style.opacity]="isPlaying && !isVideoLoading ? 0 : 1">

        <!-- Video superpuesto (se desvanece al aparecer) -->
        <video *ngIf="currentVideo"
               [src]="currentVideo" 
               autoplay muted 
               (canplay)="onVideoReady()"
               (ended)="onVideoEnded()" 
               playsinline 
               class="mascot-img video-layer"
               [style.opacity]="isPlaying && !isVideoLoading ? 1 : 0">
        </video>
      </div>

      <!-- Husky Action Buttons (Mini Version) -->
      <div class="mascot-actions" *ngIf="messages.length === 0 || !isMini">
        <button (click)="playMascotVideo('video-husky.mp4')" class="action-btn">🧸 Tierno</button>
        <button (click)="playMascotVideo('video-husky2.mp4')" class="action-btn">🎾 Jugar</button>
        <button (click)="playMascotVideo('video-husky6.mp4')" class="action-btn">💖 Panza</button>
        <button (click)="playMascotVideo('video-husky8.mp4')" class="action-btn">🥺 Ojitos</button>
        <button (click)="playMascotVideo('video-husky10.mp4')" class="action-btn">🐾 Pata</button>
        <button (click)="playMascotVideo('video-husky11.mp4')" class="action-btn">🎵 Música</button>
        <button (click)="playMascotVideo('video-husky12.mp4')" class="action-btn">📸 Foto</button>
        <button (click)="playMascotVideo('video-husky13.mp4')" class="action-btn">🍿 Cine</button>
      </div>

      <div class="welcome-bubble" *ngIf="messages.length === 0">
        <p>
          Mi nombre es <strong>Husky</strong>, habla conmigo de lo que quieras. 🐾
        </p>
      </div>
    </div>

    <!-- Historial de mensajes -->
    <div class="messages-list">
      <div
        *ngFor="let msg of messages"
        class="message-row"
        [class.user-row]="!msg.isBot"
        [class.bot-row]="msg.isBot">

        <div class="msg-avatar" *ngIf="msg.isBot">
          <img src="assets/videos/husky.png" alt="Elisa">
        </div>

        <div class="bubble" [class.bubble-user]="!msg.isBot" [class.bubble-bot]="msg.isBot">
          <p class="bubble-text">{{ msg.text }}</p>

          <!-- Product Cards inside Bot Bubble -->
          <div class="chat-products-grid" *ngIf="msg.isBot && msg.products && msg.products.length > 0">
            <div class="chat-prod-card" *ngFor="let p of msg.products" (click)="goToProduct(p)">
              <div class="cp-img-wrap">
                <img [src]="p.imagen" [alt]="p.nombre">
              </div>
              <div class="cp-content">
                <span class="cp-cat">{{ p.categoria }}</span>
                <h4 class="cp-name">{{ p.nombre }}</h4>
                <div class="cp-footer">
                  <span class="cp-price">
                    <small *ngIf="p.desde">Desde</small> {{ p.precio | currency:'USD':'symbol':'1.0-0' }}
                  </span>
                  <div class="cp-arrow">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="message-row bot-row" *ngIf="isLoading">
        <div class="msg-avatar">
          <img src="assets/videos/husky.png" alt="Elisa">
        </div>
        <div class="bubble bubble-bot typing-bubble">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>

  </div>

  <!-- ── INPUT AREA ── -->
  <footer class="chat-footer">
    <div class="input-row">
      <textarea
        [(ngModel)]="inputText"
        (keydown)="onEnter($event)"
        placeholder="Escribe tu pregunta aquí..."
        rows="1"
        class="chat-input"
        [disabled]="isLoading">
      </textarea>
      <button
        (click)="sendMessage()"
        [disabled]="isLoading || !inputText.trim()"
        class="send-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
        </svg>
      </button>
    </div>
    <p class="footer-note">Powered by Gemini AI · Camascotas</p>
  </footer>

</div>
