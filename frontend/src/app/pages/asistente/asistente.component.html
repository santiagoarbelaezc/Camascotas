<div class="chat-shell font-poppins">

  <!-- ── HEADER ── -->
  <header class="chat-header">
    <div class="header-brand">
      <div class="avatar-ring">
        <img src="assets/videos/husky.png" alt="Elisa" class="avatar-img">
        <span class="online-dot"></span>
      </div>
      <div>
        <p class="agent-name">Elisa</p>
        <p class="agent-status">Asistente de Camascotas · En línea</p>
      </div>
    </div>
    <button (click)="clearChat()" class="new-chat-btn" title="Nueva conversación">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
      Nueva conversación
    </button>
  </header>

  <!-- ── CHAT BODY ── -->
  <div class="chat-body" #chatContainer>

    <!-- Mascot Welcome -->
    <div class="mascot-welcome" *ngIf="showMascot">
      <div class="mascot-wrap">
        <video *ngIf="isPlaying" [src]="currentVideo" autoplay muted (ended)="onVideoEnded()" playsinline class="mascot-img"></video>
        <img *ngIf="!isPlaying" [src]="idleImage" alt="Husky" class="mascot-img">
      </div>

      <!-- Husky Action Buttons (Mobile Focused) -->
      <div class="mascot-actions">
        <button (click)="playMascotVideo('video-husky6.mp4')" class="action-btn">
          <span>🦴</span> Aullar
        </button>
        <button (click)="playMascotVideo('video-husky11.mp4')" class="action-btn">
          <span>🎭</span> Bailar
        </button>
        <button (click)="playMascotVideo('video-husky4.mp4')" class="action-btn">
          <span>🎾</span> Jugar
        </button>
        <button (click)="playMascotVideo('video-husky14.mp4')" class="action-btn">
          <span>✨</span> Truco
        </button>
      </div>
      <div class="welcome-bubble">
        <span class="welcome-emoji">🐾</span>
        <p>
          ¡Hola! Soy <strong>Elisa</strong>, la asistente de <strong>Camascotas</strong>.<br>
          Cuéntame sobre tu peludito y te ayudo a encontrar el <em>mueble perfecto</em> para él 🛋️
        </p>
      </div>
      <div class="quick-prompts">
        <button (click)="inputText = 'Busco una cama para mi perro grande'; sendMessage()" class="quick-btn">🐕 Cama para perro grande</button>
        <button (click)="inputText = 'Tengo un gato, ¿qué me recomiendas?'; sendMessage()" class="quick-btn">🐱 Muebles para gato</button>
        <button (click)="inputText = '¿Dónde están ubicados?'; sendMessage()" class="quick-btn">📍 ¿Dónde están?</button>
        <button (click)="inputText = 'Quiero ver el catálogo completo'; sendMessage()" class="quick-btn">📦 Ver catálogo</button>
      </div>
    </div>

    <!-- Historial de mensajes -->
    <div class="messages-list" *ngIf="!showMascot">
      <div
        *ngFor="let msg of messages"
        class="message-row"
        [class.user-row]="!msg.isBot"
        [class.bot-row]="msg.isBot">

        <div class="msg-avatar" *ngIf="msg.isBot">
          <img src="assets/videos/husky.png" alt="Elisa">
        </div>

        <div class="bubble" [class.bubble-user]="!msg.isBot" [class.bubble-bot]="msg.isBot">
          <p class="bubble-text">{{ msg.text }}</p>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="message-row bot-row" *ngIf="isLoading">
        <div class="msg-avatar">
          <img src="assets/videos/husky.png" alt="Elisa">
        </div>
        <div class="bubble bubble-bot typing-bubble">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>

  </div>

  <!-- ── INPUT AREA ── -->
  <footer class="chat-footer">
    <div class="input-row">
      <textarea
        [(ngModel)]="inputText"
        (keydown)="onEnter($event)"
        placeholder="Escribe tu pregunta aquí..."
        rows="1"
        class="chat-input"
        [disabled]="isLoading">
      </textarea>
      <button
        (click)="sendMessage()"
        [disabled]="isLoading || !inputText.trim()"
        class="send-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
        </svg>
      </button>
    </div>
    <p class="footer-note">Powered by Gemini AI · Camascotas</p>
  </footer>

</div>
